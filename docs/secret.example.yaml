# Create this secret manually on the cluster — do NOT commit with real values.
# Run: kubectl apply -f secret.yaml -n pwd-lookup
#
# Generate base64 values:
#   echo -n 'your_value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: laborlens-secrets
  namespace: pwd-lookup
type: Opaque
data:
  jwt-secret: <base64-encoded-jwt-secret>
  admin-init-password: <base64-encoded-initial-admin-password>
