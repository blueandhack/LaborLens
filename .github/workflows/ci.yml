name: Build and Push Images

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'CLAUDE.md'
      - '*.md'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/blueandhack/laborlens-backend
  FRONTEND_IMAGE: ghcr.io/blueandhack/laborlens-frontend

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  update-manifests:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Update image tags in k8s manifests
        run: |
          sed -i "s|image: .*laborlens-backend.*|image: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}|" k8s/backend.yaml
          sed -i "s|image: .*laborlens-frontend.*|image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}|" k8s/frontend.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend.yaml k8s/frontend.yaml
          git diff --cached --quiet && echo "No manifest changes" && exit 0
          git commit -m "ci: update images to ${GITHUB_SHA::8} [skip ci]"
          git push
