version: '3.8'

services:
  mongodb:
    image: mongo:8
    container_name: pwd_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: pwd_backend
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27017/pwd_cases
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: pwd_frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:5001
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - backend

volumes:
  mongodb_data:
