apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-data-pvc
  namespace: pwd-lookup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pwd-mongodb
  namespace: pwd-lookup
spec:
  selector:
    matchLabels:
      app: pwd-mongodb
  template:
    metadata:
      labels:
        app: pwd-mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:8
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
      volumes:
      - name: mongodb-data
        persistentVolumeClaim:
          claimName: mongodb-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: pwd-mongodb
  namespace: pwd-lookup
spec:
  selector:
    app: pwd-mongodb
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
