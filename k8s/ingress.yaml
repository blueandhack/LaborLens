apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-www-to-apex
  namespace: laborlens
spec:
  redirectRegex:
    regex: "^https?://www\\.laborlens\\.fyi/(.*)"
    replacement: "https://laborlens.fyi/${1}"
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: laborlens-ingress
  namespace: laborlens
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: "letsencrypt-http"
spec:
  tls:
  - hosts:
    - laborlens.fyi
    secretName: laborlens-tls
  rules:
  - host: laborlens.fyi
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: laborlens-backend
            port:
              number: 5001
      - path: /
        pathType: Prefix
        backend:
          service:
            name: laborlens-frontend
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: laborlens-ingress-www
  namespace: laborlens
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: "letsencrypt-http"
    traefik.ingress.kubernetes.io/router.middlewares: laborlens-redirect-www-to-apex@kubernetescrd
spec:
  tls:
  - hosts:
    - www.laborlens.fyi
    secretName: laborlens-www-tls
  rules:
  - host: www.laborlens.fyi
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: laborlens-frontend
            port:
              number: 80
